<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">KİP - İnce Düşünülmüş Yaşam Alanları</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="description" id="pageDescription"
        content="2010 yılından beri metrekarelerle değil santimetrekarelerle çalışarak, ince düşünülmüş yaşam alanları tasarlıyoruz.">
    <meta name="keywords" id="pageKeywords" content="kip, inşaat, konut, arsa, proje, yaşam alanları">
    <link rel="icon" id="favicon" href="https://via.placeholder.com/32x32/2c3e50/ffffff?text=N">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <h1><a href="index.html" style="text-decoration: none; color: inherit;">KİP</a></h1>
                </div>
                <ul class="nav-menu" id="dynamicNavMenu">
                    <!-- Navigation will be loaded dynamically -->
                </ul>
                <div class="nav-contact">
                    <button class="contact-btn">Sizi Arayalım</button>
                </div>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Dynamic Content Container -->
    <main id="dynamicContent">
        <!-- Content will be loaded dynamically based on the page -->
    </main>

    <!-- Footer -->
    <footer class="footer" id="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>KİP</h3>
                    <p id="footerDescription">2010 yılından beri ince düşünülmüş yaşam alanları tasarlıyoruz.</p>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-facebook"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                        <a href="#"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>
                <div class="footer-section">
                    <h4>Kurumsal</h4>
                    <ul id="footerCorporate">
                        <!-- Dynamic corporate links -->
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Projeler</h4>
                    <ul id="footerProjects">
                        <!-- Dynamic project links -->
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>İletişim</h4>
                    <ul>
                        <li><i class="fas fa-phone"></i> <span id="footerPhone">+90 212 555 00 00</span></li>
                        <li><i class="fas fa-envelope"></i> <span id="footerEmail">info@kip.com.tr</span></li>
                        <li><i class="fas fa-map-marker-alt"></i> <span id="footerAddress">İstanbul, Türkiye</span></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 KİP. Tüm hakları saklıdır.</p>
                <div class="legal-links">
                    <a href="#">KVKK</a>
                    <a href="#">Aydınlatma Metni</a>
                    <a href="#">Gizlilik Politikası</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Admin Panel Link (only visible when logged in) -->
    <div id="adminLink" style="position: fixed; bottom: 20px; left: 20px; display: none;">
        <a href="admin-data.html"
            style="background: linear-gradient(135deg, #2c3e50, #34495e); color: #fff; padding: 12px 18px; border-radius: 8px; text-decoration: none; font-size: 12px; box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3); transition: all 0.3s ease;">
            <i class="fas fa-cog"></i> Admin Panel
        </a>
    </div>

    <script src="script.js"></script>
    <script src="admin-data.js"></script>
    <script>
        // Page Configuration
        const pageConfigs = {
            'index.html': {
                title: 'Ana Sayfa',
                sections: ['hero', 'featured-projects', 'kip-arsa', 'cta', 'contact']
            },
            'biz-kimiz.html': {
                title: 'Biz Kimiz',
                sections: ['hero', 'story', 'values', 'timeline', 'team', 'awards']
            },
            'biz-kimiz-new.html': {
                title: 'Biz Kimiz - Gelişmiş',
                sections: ['hero', 'story', 'values', 'timeline', 'team', 'awards']
            },
            'projeler.html': {
                title: 'Projeler',
                sections: ['hero', 'projects-grid', 'filters']
            },
            'kip-kesifleri.html': {
                title: 'Kip Keşifleri',
                sections: ['hero', 'featured', 'innovation', 'categories', 'discoveries', 'newsletter']
            },
            'kip-kesifleri-new.html': {
                title: 'Kip Keşifleri - Gelişmiş',
                sections: ['hero', 'featured', 'innovation', 'categories', 'discoveries', 'newsletter']
            },
            'iletisim.html': {
                title: 'İletişim',
                sections: ['hero', 'contact-form', 'info-cards', 'map', 'offices', 'faq']
            },
            'iletisim-new.html': {
                title: 'İletişim - Gelişmiş',
                sections: ['hero', 'contact-main', 'offices', 'faq']
            }
        };

        // Get current page
        function getCurrentPage() {
            const path = window.location.pathname;
            const filename = path.split('/').pop() || 'index.html';
            return filename;
        }

        // Load dynamic content
        function loadDynamicContent() {
            const currentPage = getCurrentPage();
            const config = pageConfigs[currentPage];

            if (!config) {
                console.error('Page configuration not found:', currentPage);
                return;
            }

            // Load page metadata
            loadPageMetadata(currentPage);

            // Load navigation
            loadNavigation();

            // Load page sections
            loadPageSections(currentPage);

            // Load footer
            loadFooter();

            // Check admin status
            checkAdminStatus();
        }

        function loadPageMetadata(page) {
            const pages = window.KİPAdminEnhanced.getPages();
            const pageData = pages.find(p => p.file === page);
            const settings = window.KİPAdminEnhanced.getSettings();

            if (pageData) {
                document.getElementById('pageTitle').textContent = pageData.title;
                document.getElementById('pageDescription').content = pageData.description || settings.siteDescription;
                document.getElementById('pageKeywords').content = pageData.keywords || settings.metaKeywords;
            } else {
                document.getElementById('pageTitle').textContent = settings.siteTitle;
                document.getElementById('pageDescription').content = settings.siteDescription;
                document.getElementById('pageKeywords').content = settings.metaKeywords;
            }

            if (settings.faviconUrl) {
                document.getElementById('favicon').href = settings.faviconUrl;
            }
        }

        function loadNavigation() {
            const navMenu = document.getElementById('dynamicNavMenu');
            navMenu.innerHTML = window.KİPAdminEnhanced.generateNavigationHTML();
        }

        function loadPageSections(page) {
            const container = document.getElementById('dynamicContent');
            const sections = window.KİPAdminEnhanced.getSections().filter(s => s.page === page).sort((a, b) => a.order - b.order);

            if (sections.length === 0) {
                // Load default content if no sections found
                loadDefaultContent(page);
                return;
            }

            let html = '';
            sections.forEach(section => {
                html += generateSectionHTML(section);
            });

            container.innerHTML = html;
        }

        function generateSectionHTML(section) {
            switch (section.type) {
                case 'hero':
                    return generateHeroHTML(section);
                case 'text':
                    return generateTextHTML(section);
                case 'card':
                    return generateCardHTML(section);
                case 'feature':
                    return generateFeatureHTML(section);
                case 'contact':
                    return generateContactHTML(section);
                case 'cta':
                    return generateCTAHTML(section);
                case 'custom':
                    return generateCustomHTML(section);
                default:
                    return `<section class="unknown-section"><div class="container"><p>Bilinmeyen bölüm tipi: ${section.type}</p></div></section>`;
            }
        }

        function generateHeroHTML(section) {
            const bgStyle = section.bgImage ?
                `background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%), url('${section.bgImage}') center/cover;` :
                `background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);`;

            return `
                <section class="hero-section" style="${bgStyle}">
                    <div class="container">
                        <div class="hero-content">
                            <h1>${section.title}</h1>
                            <p>${section.subtitle}</p>
                            ${section.content ? `<div class="hero-content-extra">${section.content}</div>` : ''}
                        </div>
                    </div>
                </section>
            `;
        }

        function generateTextHTML(section) {
            return `
                <section class="text-section" style="background: ${section.bgColor}; padding: 80px 0;">
                    <div class="container">
                        <h2 style="font-size: 2.5rem; font-weight: 300; color: #2c3e50; margin-bottom: 1rem;">${section.title}</h2>
                        <p style="font-size: 1.2rem; color: #666; margin-bottom: 2rem;">${section.subtitle}</p>
                        <div class="text-content" style="line-height: 1.8; color: #666;">
                            ${section.content}
                        </div>
                    </div>
                </section>
            `;
        }

        function generateCardHTML(section) {
            return `
                <section class="card-section" style="background: ${section.bgColor}; padding: 80px 0;">
                    <div class="container">
                        <h2 style="font-size: 2.5rem; font-weight: 300; color: #2c3e50; margin-bottom: 1rem;">${section.title}</h2>
                        <p style="font-size: 1.2rem; color: #666; margin-bottom: 2rem;">${section.subtitle}</p>
                        <div class="cards-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                            ${section.content || '<div class="card-placeholder">Card content buraya gelecek</div>'}
                        </div>
                    </div>
                </section>
            `;
        }

        function generateFeatureHTML(section) {
            return `
                <section class="feature-section" style="background: ${section.bgColor}; padding: 80px 0;">
                    <div class="container">
                        <h2 style="font-size: 2.5rem; font-weight: 300; color: #2c3e50; margin-bottom: 1rem;">${section.title}</h2>
                        <p style="font-size: 1.2rem; color: #666; margin-bottom: 2rem;">${section.subtitle}</p>
                        <div class="feature-content">
                            ${section.content}
                        </div>
                    </div>
                </section>
            `;
        }

        function generateContactHTML(section) {
            return `
                <section class="contact-section" style="background: ${section.bgColor}; padding: 80px 0;">
                    <div class="container">
                        <h2 style="font-size: 2.5rem; font-weight: 300; color: #2c3e50; margin-bottom: 1rem;">${section.title}</h2>
                        <p style="font-size: 1.2rem; color: #666; margin-bottom: 2rem;">${section.subtitle}</p>
                        <div class="contact-content">
                            ${section.content}
                        </div>
                    </div>
                </section>
            `;
        }

        function generateCTAHTML(section) {
            return `
                <section class="cta-section" style="background: linear-gradient(135deg, #2c3e50, #34495e); color: #fff; padding: 80px 0;">
                    <div class="container">
                        <h2 style="font-size: 2.5rem; font-weight: 300; margin-bottom: 1rem;">${section.title}</h2>
                        <p style="font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem;">${section.subtitle}</p>
                        <div class="cta-content">
                            ${section.content}
                        </div>
                    </div>
                </section>
            `;
        }

        function generateCustomHTML(section) {
            return `
                <section class="custom-section" style="background: ${section.bgColor}; padding: 80px 0;">
                    <div class="container">
                        <h2 style="font-size: 2.5rem; font-weight: 300; color: #2c3e50; margin-bottom: 1rem;">${section.title}</h2>
                        <p style="font-size: 1.2rem; color: #666; margin-bottom: 2rem;">${section.subtitle}</p>
                        <div class="custom-content">
                            ${section.content}
                        </div>
                    </div>
                </section>
            `;
        }

        function loadDefaultContent(page) {
            const container = document.getElementById('dynamicContent');
            let html = '';

            switch (page) {
                case 'index.html':
                    html = `
                        <section class="hero" style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%); color: #fff; padding: 120px 0;">
                            <div class="container">
                                <div class="hero-content">
                                    <h2 style="font-size: 3rem; font-weight: 300; margin-bottom: 1rem;">2010 yılından beri metrekarelerle değil santimetrekarelerle çalışarak, ince düşünülmüş yaşam alanları tasarlıyoruz.</h2>
                                    <div class="hero-buttons">
                                        <button class="btn-primary">Projeler</button>
                                        <button class="btn-secondary">Keşfet</button>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <section class="featured-projects" style="padding: 80px 0; background: #fff;">
                            <div class="container">
                                <h2 style="font-size: 2.5rem; font-weight: 300; color: #2c3e50; margin-bottom: 2rem;">Öne Çıkan Projeler</h2>
                                <div class="projects-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem;">
                                    ${window.KİPAdminEnhanced.generateCardsHTML('index.html')}
                                </div>
                            </div>
                        </section>
                    `;
                    break;
                default:
                    html = `
                        <section style="padding: 120px 0; text-align: center;">
                            <div class="container">
                                <h1 style="font-size: 3rem; font-weight: 300; color: #2c3e50; margin-bottom: 1rem;">${page}</h1>
                                <p style="font-size: 1.2rem; color: #666;">Bu sayfa henüz yapılandırılmamış. Admin panelinden içerik ekleyebilirsiniz.</p>
                            </div>
                        </section>
                    `;
            }

            container.innerHTML = html;
        }

        function loadFooter() {
            const settings = window.KİPAdminEnhanced.getSettings();
            const navigation = window.KİPAdminEnhanced.getNavigationItems();

            // Update footer info
            document.getElementById('footerDescription').textContent = settings.siteDescription;
            document.getElementById('footerPhone').textContent = settings.contactPhone;
            document.getElementById('footerEmail').textContent = settings.contactEmail;
            document.getElementById('footerAddress').textContent = settings.contactAddress;

            // Update footer corporate links
            const corporateLinks = document.getElementById('footerCorporate');
            const corporateNav = navigation.find(item => item.name === 'Biz Kimiz');
            if (corporateNav && corporateNav.subItems) {
                corporateLinks.innerHTML = corporateNav.subItems.map(sub =>
                    `<li><a href="${sub.url}">${sub.name}</a></li>`
                ).join('');
            }

            // Update footer project links
            const projectLinks = document.getElementById('footerProjects');
            const projectNav = navigation.find(item => item.name === 'Projeler');
            if (projectNav && projectNav.subItems) {
                projectLinks.innerHTML = projectNav.subItems.map(sub =>
                    `<li><a href="${sub.url}">${sub.name}</a></li>`
                ).join('');
            }
        }

        function checkAdminStatus() {
            const adminLink = document.getElementById('adminLink');
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                adminLink.style.display = 'block';
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function () {
            loadDynamicContent();

            // Reinitialize mobile menu after dynamic content load
            setTimeout(() => {
                const hamburger = document.querySelector('.hamburger');
                const navMenu = document.querySelector('.nav-menu');

                if (hamburger && navMenu) {
                    hamburger.addEventListener('click', () => {
                        hamburger.classList.toggle('active');
                        navMenu.classList.toggle('active');
                    });

                    // Close mobile menu when clicking on a link
                    document.querySelectorAll('.nav-link').forEach(n => n.addEventListener('click', () => {
                        hamburger.classList.remove('active');
                        navMenu.classList.remove('active');
                    }));
                }
            }, 100);
        });

        // Dynamic content update function (can be called from admin panel)
        function refreshContent() {
            loadDynamicContent();
        }

        // Make refreshContent available globally
        window.refreshContent = refreshContent;
    </script>
</body>

</html>
